<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>4-Out 1-In 모션 오펜스 시뮬레이터</title>
<style>
    body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f0f0f0; }
    #court {
        width: 600px; height: 500px; background-color: #f4c28d;
        border: 4px solid #333; position: relative; margin: 20px auto; overflow: hidden;
    }
    .line { position: absolute; border: 2px solid white; box-sizing: border-box; }
    .paint { width: 160px; height: 230px; border-bottom: none; left: 220px; top: 0; background-color: #d18b47; }
    .three-point {
        width: 480px; height: 480px; border-radius: 50%; left: 60px; top: -140px;
        clip-path: polygon(0 40%, 100% 40%, 100% 100%, 0 100%);
    }
    .rim { width: 30px; height: 30px; border-radius: 50%; border: 3px solid #e74c3c; left: 285px; top: 40px; background: white; }
    .player {
        width: 30px; height: 30px; border-radius: 50%; position: absolute;
        color: white; font-weight: bold; line-height: 30px; font-size: 14px;
        transition: all 1s ease-in-out; z-index: 10;
    }
    .offense { background-color: #3498db; border: 2px solid #2980b9; }
    .defense { background-color: transparent; border: 2px solid #c0392b; color: #c0392b; }
    .ball {
        width: 16px; height: 16px; border-radius: 50%; background-color: #e67e22; position: absolute;
        transition: all 1s ease-in-out; z-index: 20; border: 1px solid #d35400;
    }
    .controls { margin-top: 10px; }
    button { padding: 10px 15px; margin: 5px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 5px; border: 1px solid #999; }
    button:hover { background-color: #ddd; }
    #desc { margin-top: 15px; font-size: 16px; font-weight: bold; color: #333; height: 30px; }
</style>
</head>
<body>

<h2>🏀 4-Out 1-In 모션 오펜스 시뮬레이터</h2>

<div class="controls">
    <button onclick="play1()">1. 하이포스트 연계 (빅맨 & 컷인)</button>
    <button onclick="play2()">2. 슬롯 갭 돌파 (가운데 틈새)</button>
    <button onclick="play3()">3. 딥윙 갭 돌파 (대각선 틈새)</button>
    <button onclick="play4()">4. 하이포스트 연계(빅맨 패스를 못 줬을 때)</button>
    <button onclick="play5()">5. 수비수가 아주 멀리 떨어져서 수비할 때</button>
    <button onclick="play6()">6. 슬롯 선수가 패스를 주고 컷인할 때</button>
    <button onclick="play7()">7. 딥윙 선수가 패스를 주고 컷인할 때</button>
    <button onclick="play8()">8. 로테이션 후 파생 공격 (반대편 스윙 & 돌파)</button>
    <button onclick="resetCourt()" style="background-color: #ffcccc;">초기화</button>
</div>

<div id="desc">버튼을 눌러 전술 움직임을 확인하세요.</div>

<div id="court">
    <div class="line paint"></div>
    <div class="line three-point"></div>
    <div class="line rim"></div>
    
    <!-- 수비수 (X) -->
    <div id="x1" class="player defense" style="left: 200px; top: 230px;">X1</div>
    <div id="x2" class="player defense" style="left: 370px; top: 230px;">X2</div>
    <div id="x3" class="player defense" style="left: 140px; top: 120px;">X3</div>
    <div id="x4" class="player defense" style="left: 430px; top: 120px;">X4</div>
    <div id="x5" class="player defense" style="left: 240px; top: 45px;">X5</div>

    <!-- 공격수 (O) -->
    <div id="o1" class="player offense" style="left: 150px; top: 380px;">O1</div>
    <div id="o2" class="player offense" style="left: 420px; top: 380px;">O2</div>
    <div id="o3" class="player offense" style="left: 50px; top: 200px;">O3</div>
    <div id="o4" class="player offense" style="left: 520px; top: 200px;">O4</div>
    <div id="o5" class="player offense" style="left: 200px; top: 50px;">O5</div>
    
    <!-- 농구공 -->
    <div id="ball" class="ball" style="left: 170px; top: 370px;"></div>
</div>

<script>
    let timeouts = [];
    function clearAll() { timeouts.forEach(clearTimeout); timeouts = []; }
    function move(id, x, y) { document.getElementById(id).style.left = x + 'px'; document.getElementById(id).style.top = y + 'px'; }
    function setText(text) { document.getElementById('desc').innerText = text; }

    function resetCourt() {
        clearAll();
        move('x1', 200, 230); move('x2', 370, 230); move('x3', 140, 120); move('x4', 430, 120); move('x5', 240, 45);
        move('o1', 150, 380); move('o2', 420, 380); move('o3', 50, 200); move('o4', 520, 200); move('o5', 200, 50);
        move('ball', 170, 370);
        setText("초기 상태 (수비가 골밑으로 쳐져 있는 2-3 새깅 디펜스)");
    }

    function play1() {
        resetCourt(); clearAll(); setText("1단계: 빅맨(O5)이 하이포스트로 올라오며 패스를 받습니다.");
        timeouts.push(setTimeout(() => { move('o5', 285, 230); move('ball', 290, 220); move('x5', 285, 180); }, 1000));
        timeouts.push(setTimeout(() => { setText("2단계: 딥윙(O3)이 수비 뒷공간(베이스라인)으로 컷인합니다."); move('o3', 50, 80); }, 2000));
        timeouts.push(setTimeout(() => { setText("2단계: 딥윙(O3)이 수비 뒷공간(베이스라인)으로 컷인합니다."); move('o3', 240, 50); }, 3000));
        timeouts.push(setTimeout(() => { setText("3단계: 빅맨이 컷인하는 동료에게 완벽한 골밑 찬스를 내줍니다."); move('ball', 250, 60); }, 4000));
    }

    function play2() {
        resetCourt(); clearAll(); setText("1단계: 슬롯(O1)이 수비수 X1과 X2 사이의 '틈'으로 짧게 돌파합니다.");
        
        // 이동 명령을 하나로 합치고, 여유롭게 0.5초(500ms) 뒤에 출발하도록 수정
        timeouts.push(setTimeout(() => { 
            move('o1', 285, 200); 
            move('ball', 295, 190); 
            move('x1', 220, 240); 
            move('x2', 340, 240);
            move('x5', 280, 110);
        }, 500));

        timeouts.push(setTimeout(() => { 
            setText("2단계: 두 수비수가 혼란에 빠져 모여들면 숏점퍼를 쏩니다."); 
            move('o5', 220, 50);
        }, 1500));

        timeouts.push(setTimeout(() => { 
            move('ball', 300, 50); 
            setText("득점 성공!"); 
        }, 2500));
    }

    function play3() {
        resetCourt(); clearAll(); setText("1단계: 공이 딥윙(O3)에게 전달됩니다.");
        timeouts.push(setTimeout(() => { move('ball', 70, 190); }, 1000));
        timeouts.push(setTimeout(() => { setText("2단계: 딥윙(O3)이 수비수 X1과 X3 사이 공간으로 대각선 돌파합니다."); move('o3', 140, 180); move('ball', 150, 170); }, 2500));
        timeouts.push(setTimeout(() => { setText("3단계: 수비가 몰리면 밖으로 빠져나온 슬롯(O1)에게 다시 패스합니다."); move('x1', 170, 200); move('x3', 140, 150); move('o1', 100, 330); }, 3500));
        timeouts.push(setTimeout(() => { move('ball', 120, 350); }, 4500));
        timeouts.push(setTimeout(() => { setText("4단계: 만들어진 공간을 활용하여 돌파나 컷인을 합니다."); move('o2', 285, 150);}, 5500));
        timeouts.push(setTimeout(() => { move('ball', 285, 150); }, 6500));
    }

    function play4() {
        resetCourt(); clearAll(); setText("초기 세팅: 빅맨(O5)이 하이포스트에서 공을 잡고 있습니다.");
        move('o5', 285, 230); move('ball', 290, 220); move('x5', 285, 180);
        timeouts.push(setTimeout(() => { setText("1단계: 딥윙(O3)이 베이스라인으로 뛰어 수비(X3)를 골밑으로 끌고 갑니다."); move('o3', 200, 50); move('x3', 170, 80); }, 1000));
        timeouts.push(setTimeout(() => { setText("2단계: 빈자리로 슬롯(O1)이 내려오고, O2도 이동하여 밸런스를 맞춥니다."); move('o1', 75, 150); move('o2', 150, 380); }, 2500));
        timeouts.push(setTimeout(() => { setText("3단계: 완벽한 노마크 상태가 된 O1에게 패스하여 슛을 던집니다."); move('ball', 85, 145); }, 4000));
        timeouts.push(setTimeout(() => {move('ball', 300, 50); }, 5000));
    }

    function play5() {
        resetCourt(); clearAll(); setText("초기 세팅: 수비수들이 전체적으로 멀리 떨어져서 수비(=새깅)합니다.");
        timeouts.push(setTimeout(() => { move('x1', 230, 180); move('x2', 310, 180); move('x3', 150, 80); move('x4', 380, 80); move('x5', 280, 80);  move('o5', 350, 70);}, 500));
        timeouts.push(setTimeout(() => { move('ball', 60, 190); }, 1000));
        timeouts.push(setTimeout(() => { setText("1단계: 공을 가진 선수가 수비수 쪽으로 천천히 다가갑니다."); move('o3', 90, 140); move('ball', 95, 135);}, 2500));
        timeouts.push(setTimeout(() => { setText("2단계: 수비수가 다가오지 않으면 점프슛을 던집니다."); move('ball', 290, 50); }, 3500));
        timeouts.push(setTimeout(() => {move('ball', 90, 150); }, 4500));
        timeouts.push(setTimeout(() => { setText("3단계: 수비수가 급하게 다가오면 돌파합니다."); move('x3', 100, 140); }, 5500));
        timeouts.push(setTimeout(() => { setText("3단계: 수비수가 급하게 다가오면 돌파합니다."); move('o3', 80, 130); move('ball', 85, 120);}, 6000));
        timeouts.push(setTimeout(() => { setText("3단계: 수비수가 급하게 다가오면 돌파합니다."); move('o3', 290, 55); move('ball', 300, 50);}, 7000));
    }

    function play6() {
        resetCourt(); clearAll(); setText("1단계: 슬롯(O1)이 같은 쪽 딥윙(O3)에게 패스합니다.");
        
        // 1. 패스
        timeouts.push(setTimeout(() => { 
            move('ball', 70, 190); 
        }, 500));
        
        // 2. 직선 컷인
        timeouts.push(setTimeout(() => { 
            setText("2단계: 패스 직후, 수비 중앙을 가로질러 림을 향해 직선으로 컷인합니다."); 
            move('o1', 285, 80); 
            // 수비가 가운데로 살짝 쏠리는 효과
            move('x1', 250, 180); move('x2', 320, 180); move('x5', 285, 100);
        }, 1500));
        
        // 3. 클리어 아웃 및 빈자리 채우기 (도미노)
        timeouts.push(setTimeout(() => { 
            setText("3단계: 반대편으로 빠져나가고(골밑에서 머무르지 말고), 나머지 선수들이 자리를 당겨 채웁니다."); 
            // O1은 반대편 코너로 빠짐
            move('o1', 520, 50); 
            // O2는 O1의 원래 자리로 수평 이동
            move('o2', 150, 380); 
            // O4는 O2의 원래 자리로 위로 이동
            move('o4', 420, 380); 
        }, 3000));
    }

    function play7() {
        resetCourt(); clearAll(); setText("초기 세팅: 딥윙(O3)이 공을 잡고 시작합니다.");
        
        // 초기 공 위치를 딥윙(O3)으로 세팅
        move('ball', 70, 190); 
        
        // 1. 패스
        timeouts.push(setTimeout(() => { 
            setText("1단계: 딥윙(O3)이 위쪽 슬롯(O1)에게 패스합니다."); 
            move('ball', 170, 370); 
        }, 1000));
        
        // 2. 베이스라인 컷인
        timeouts.push(setTimeout(() => { 
            setText("2단계: 패스 직후, 수비수 등 뒤(베이스라인)를 타고 컷인합니다."); 
            move('o3', 285, 50); 
            // 컷인하는 선수를 보고 수비가 베이스라인으로 쳐짐
            move('x3', 200, 80); move('x5', 285, 80);
        }, 2500));
        
        // 3. 클리어 아웃 및 빈자리 채우기 (도미노)
        timeouts.push(setTimeout(() => { 
            setText("3단계: 반대편으로 빠지고, O1이 딥윙으로 내려오며 자리를 맞춥니다."); 
            // O3는 반대편 딥윙으로 크게 돌아 나감
            move('o3', 520, 100); 
            // O1은 비어있는 딥윙으로 드리블하며 내려옴 (Sink)
            move('o1', 50, 200); move('ball', 70, 190);
            // O2는 O1의 자리로 이동
            move('o2', 150, 380); 
            // O4는 O2의 자리로 이동
            move('o4', 420, 380); 
        }, 4000));
    }
    
    function play8() {
        resetCourt(); clearAll(); setText("초기 세팅: 컷인과 로테이션을 진행하여 수비를 왼쪽으로 몰아넣습니다.");
        
        // 1. O3 -> O1 패스 및 로테이션 시작 (빠르게 진행)
        move('ball', 70, 190); 
        timeouts.push(setTimeout(() => { 
            move('ball', 170, 370); // O1에게 패스
            move('o3', 285, 50);    // O3 골밑 컷인
            move('x3', 200, 80); move('x5', 285, 80); // 수비가 컷인 막으러 쏠림
        }, 500));

        // 2. 도미노 이동 완료 (왼쪽에 수비 갇힘)
        timeouts.push(setTimeout(() => { 
            setText("1단계: 로테이션 완료 후 골밑과 왼쪽이 막히면, '반대편 전환(스윙패스)'을 준비합니다."); 
            move('o3', 520, 200); // O3 반대편 딥윙으로 클리어아웃
            move('o1', 50, 200); move('ball', 70, 190); // O1 딥윙으로 내려옴(Sink)
            move('o2', 150, 380); // O2 슬롯 이동
            move('o4', 420, 380); // O4 슬롯 이동
            // 수비가 왼쪽 외곽을 막기 위해 완전히 쏠림
            move('x1', 120, 200); move('x2', 250, 230); 
        }, 2000));

        // 3. 스윙 패스 (O1 -> O2 -> O4)
        timeouts.push(setTimeout(() => { 
            setText("2단계: 수비가 없는 반대편으로 빠르고 길게 패스를 돌립니다 (스윙패스)."); 
            move('ball', 150, 370); // O1 -> O2 패스
        }, 4000));

        timeouts.push(setTimeout(() => { 
            move('ball', 420, 370); // O2 -> O4 패스
        }, 5000));

        // 4. 반대편 돌파 (에이스의 역할)
        timeouts.push(setTimeout(() => { 
            setText("3단계: 넓은 틈(갭)을 확보한 반대편 선수가 망설임 없이 돌파하여 득점합니다."); 
            move('o4', 320, 150); move('ball', 330, 140); // 대각선 갭 돌파
            move('x4', 380, 150); // 뒤늦게 X4가 따라와보지만 늦음
        }, 6500));

        timeouts.push(setTimeout(() => { 
            move('o4', 285, 60); move('ball', 300, 50); // 레이업 마무리
        }, 7500));
    }
</script>
</body>
</html>
